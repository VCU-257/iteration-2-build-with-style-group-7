<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restock - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form class="animate-load-in">
        <div class="text-center mb-4">
            <h1 class="brand">RESTOCK</h1>
            <p class="text-muted">Welcome back! Please log in.</p>
        </div>

        <div class="form-group mb-3">
            <label for="user">Phone/Email</label>
            <input type="email" class="form-control" id="user" aria-describedby="emailHelp">
        </div>
        
        <div class="form-group mb-4">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password">
        </div>
        
        <a href="home.html" class="btn btn-primary w-100 mb-3">Sign In</a>
        
        <div class="d-flex justify-content-between mt-2">
            <small><a href="#" class="text-muted text-decoration-none">Forgot Password?</a></small>
            <small><a href="sign-up.html" class="text-decoration-none fw-bold" style="color: var(--surface-accent);">Create Account</a></small>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
