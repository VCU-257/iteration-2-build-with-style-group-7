<!DOCTYPE html>
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>RESTOCK - Sign Up</title>
        <link rel="stylesheet" href="../style.css">
    </head>
    <body class="d-flex align-items-center justify-content-center vh-100">

        <form class="animate-load-in">
            <div class="text-center mb-4">
                <h1 class="brand">RESTOCK</h1>
                <p class="text-muted">Create your account to get started!</p>
            </div>

            <div class="form-group">
                <label for="user">Phone/Email</label>
                <input type="email" class="form-control" id="user" aria-describedby="emailHelp">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password">
            </div>
            <div class="form-group">
                <label for="password2">Retype Password</label>
                <input type="password" class="form-control" id="password2">
            </div>
           
            
            <a href="./home.html" class="btn btn-primary w-100 mb-3">Create Account</a>
            
            <div class="d-flex justify-content-between mt-2">
                <small><a href="../index.html" class="text-decoration-none fw-bold" style="color: var(--surface-accent);">I already have an account</a></small>
            </div>
        </form>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
    
</html>
