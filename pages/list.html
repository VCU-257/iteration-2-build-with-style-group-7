<!DOCTYPE html>
<html lang="en">
<head>
    <title>Group Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div id="header-placeholder" class="d-none d-md-block"></div>
<div class="container mt-5">

    <div class="card card-static mb-4 shadow-sm">
        <div class="card-body">
            
            <div class="d-flex justify-content-between align-items-start">
                <div class="d-flex align-items-center gap-3">

                    <div>
                        <h3 class="mb-1">List Name</h3>
                        <p class="text-muted mb-0">12 Items</p>
                    </div>
                </div>

                <div class="dropdown">
                    <button class="btn text-muted p-1" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="border: none;">
                        <i class="bi bi-three-dots-vertical fs-4"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" style="background-color: var(--bg-secondary);">
                        <li><a class="dropdown-item" href="#"><i class="bi bi-pencil me-2"></i>Edit List</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#"><i class="bi bi-trash me-2"></i>Delete List</a></li>
                    </ul>
                </div>
            </div>

            <div class="d-flex gap-3 mt-4">
                <button class="btn btn-success flex-grow-1"><i class="bi bi-plus-lg me-2"></i>Add Item</button>
            </div>

        </div>
    

    
    
        <div class="card-body">
            
            <div class="list-group">
                
                <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center position-relative pe-5">
                    <a href="#" class="text-decoration-none flex-grow-1 d-flex align-items-center gap-3">
                        <div>
                            <h6 class="mb-1 fw-bold text-dark">Item 1</h6>
                            <small class="text-muted">Added 2 hours ago</small>
                        </div>
                        <span class="badge ms-auto me-3" style=" color: var(--surface-green-dark);">12 Items</span>
                    </a>
                    
                    
                </div>

                <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center position-relative pe-5">
                    <a href="#" class="text-decoration-none flex-grow-1 d-flex align-items-center gap-3">
                        <div>
                            <h6 class="mb-1 fw-bold text-dark">Item 2</h6>
                            <small class="text-muted">Added yesterday</small>
                        </div>
                        <span class="badge ms-auto me-3" style=" color: var(--surface-green-dark);">5 Items</span>
                    </a>
                
                </div>

            </div>
        </div>
    </div>

</div>
    <div id="nav-placeholder" class="d-block d-md-none"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="../app.js"></script>
</body>
</html>
