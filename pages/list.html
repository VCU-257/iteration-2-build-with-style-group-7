<!DOCTYPE html>
<html lang="en">
<head>
    <title>RESTOCK - List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div id="header-placeholder" class="d-none d-md-block"></div>
<div class="container mt-5">
    <div class="mb-3">
        <a href="group-detail.html" class="text-decoration-none text-muted">< Back to Group</a>
    </div>
    <div class="card card-static mb-4 shadow-sm">
        <div class="card-body" style="border-bottom: 2px solid rgba(154, 91, 50, 0.5);">
            
            <div class="d-flex justify-content-between align-items-start">
                <div class="d-flex align-items-center gap-3">

                    <div>
                        <h3 class="mb-1">List Name</h3>
                        <p class="text-muted mb-0">12 Items</p>
                    </div>
                </div>

                <div class="dropdown">
                    <button class="btn text-muted p-1" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="border: none;">
                        <i class="bi bi-three-dots-vertical fs-4"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" style="background-color: var(--bg-secondary);">
                        <li><a class="dropdown-item" href="#"><i class="bi bi-pencil me-2"></i>Edit List</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#"><i class="bi bi-trash me-2"></i>Delete List</a></li>
                    </ul>
                </div>
            </div>

            

        </div>
    
    
        <div class="card-body">
            
            <div class="list-group">
                
                    <button class="btn btn-success flex-grow-1" data-bs-toggle="modal" data-bs-target="#addItemModal">
                        <i class="bi bi-plus-lg me-2"></i>Add Item
                    </button>
    
                    <div class="list-item list-group-item-action d-flex align-items-center gap-3">
                        <input class="form-check-input m-0 fs-5" type="checkbox" value="" id="check-item-1">
                        
                        <div class="flex-grow-1">
                            <h6 class="mb-0 fw-bold text-dark">Item 1</h6>
                            <small class="text-muted">Added Just Now</small>
                        </div>

                        <div class="d-flex align-items-center gap-2">
                            <button class="btn btn-outline-secondary qty-btn">
                                <i class="bi bi-dash"></i>
                            </button>
                            <span class="fw-bold text-dark qty-text">1</span>
                            <button class="btn btn-outline-secondary qty-btn">
                                <i class="bi bi-plus"></i>
                            </button>
                        </div>
                    </div>

                    <div class="list-item-last list-group-item-action d-flex align-items-center gap-3">
                        <input class="form-check-input m-0 fs-5" type="checkbox" value="" id="check-item-1">
                        
                        <div class="flex-grow-1">
                            <h6 class="mb-0 fw-bold text-dark">Item 2</h6>
                            <small class="text-muted">Added 2 hours ago</small>
                        </div>

                        <div class="d-flex align-items-center gap-2">
                            <button class="btn btn-outline-secondary qty-btn">
                                <i class="bi bi-dash"></i>
                            </button>
                            <span class="fw-bold text-dark qty-text">4</span>
                            <button class="btn btn-outline-secondary qty-btn">
                                <i class="bi bi-plus"></i>
                            </button>
                        </div>
                    </div>

                

            </div>
        </div>
    </div>

</div>
    <div id="nav-placeholder" class="d-block d-md-none"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="../app.js"></script>
<div class="modal fade" id="addItemModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn btn-link text-dark p-0" data-bs-dismiss="modal">
                    <i class="bi bi-chevron-left fs-4" style="color: var(--surface-green-dark);"></i>
                </button>
                <h4 class="modal-title w-100 text-center">New Item</h4>
                <div style="width: 32px;"></div> </div>

            <div class="modal-body p-4">
                <div class="mb-4">
                    <input type="text" class="form-control" placeholder="Item name">
                </div>

                <div class="row align-items-center mb-5">
                    <div class="col-6">
                        <div class="d-flex align-items-center gap-2">
                            <button class="btn btn-outline-secondary qty-btn"><i class="bi bi-dash"></i></button>
                            <span class="fw-bold qty-text">1</span>
                            <button class="btn btn-outline-secondary qty-btn"><i class="bi bi-plus"></i></button>
                        </div>
                    </div>
                    <div class="col-6 text-end">
                        <div class="form-check d-inline-block text-start">
                            <input class="form-check-input" type="checkbox" id="repeatCheck">
                            <label class="form-check-label ms-1 text-muted" for="repeatCheck">Repeat Item?</label>
                        </div>
                    </div>
                </div>

                <div class="text-center">
                    <button type="button" class="btn btn-primary px-5 py-3 fs-5 w-75 shadow-sm" data-bs-dismiss="modal">
                        Add
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
