<!DOCTYPE html>
<html>
<head>
    <title>RESTOCK - Groups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="header-placeholder" class="d-none d-md-block"></div>
    <div class="container mt-5">

        <h2>Your Groups</h2>

        <div class="row g-4 mb-4  d-md-flex">
            <div class="col-md-6">
                <div class="card mb-3 position-relative shadow-sm">
                    <button class="btn btn-link position-absolute top-0 end-0 p-3 text-warning favorite-btn" data-type="group" data-id="group-1" aria-label="Favorite">
                        <i class="bi bi-star fs-5"></i>
                    </button>
                    
                    <div class="card-body">
                        <h5 class="card-title mt-1">Group 1</h5>
                        <p class="card-text text-muted mb-3">3 Members</p>
                        
                        <div class="d-flex gap-2 mt-2">
                            <a href="./group-detail.html" class="btn btn-primary flex-grow-1">View</a>
                            <button type="button" class="btn btn-outline-secondary flex-grow-1">Edit</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card mb-3 position-relative shadow-sm">
                    <button class="btn btn-link position-absolute top-0 end-0 p-3 text-warning favorite-btn" aria-label="Favorite">
                        <i class="bi bi-star fs-5"></i>
                    </button>
                    
                    <div class="card-body">
                        <h5 class="card-title mt-1">Group 2</h5>
                        <p class="card-text text-muted mb-3">4 Members</p>
                        
                        <div class="d-flex gap-2 mt-2">
                            <a href="./group-detail.html" class="btn btn-primary flex-grow-1">View</a>
                            <button type="button" class="btn btn-outline-secondary flex-grow-1">Edit</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="mt-5 mb-3 d-none d-md-block">Add a Group</h3>

        <div class="row g-4 mb-4 d-none d-md-flex">
            
            <div class="col-md-6">
                <div class="card card-static ">
                    <div class="card-body">
                        <h5 class="card-title d-flex align-items-center mb-3">
                            Create New Group
                        </h5>
                        
                        <form>
                            <div class="mb-3">
                                <input type="text" class="form-control" placeholder="Enter Group Name">
                            </div>
                            <button class="btn btn-success w-100">Create Group</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card card-static ">
                    <div class="card-body">
                        <h5 class="card-title d-flex align-items-center mb-3">
                            Join Existing Group
                        </h5>
                        
                        <form>
                            <div class="mb-3">
                                <input type="text" class="form-control" placeholder="Enter Code">
                            </div>
                            <button class="btn btn-outline-secondary w-100">Join Group</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>

    </div>
    <div id="fab-placeholder" class="d-block d-md-none"></div>
    <div id="nav-placeholder" class="d-block d-md-none"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="../app.js"></script>
</body>
</html>
